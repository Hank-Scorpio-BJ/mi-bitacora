<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muro | Mi Bitácora</title>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=La+Belle+Aurore&family=Cormorant+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg-wood: #3d352d;
    --paper: #ffffff;
    --line-blue: #e1eef4;
    --margin-red: rgba(255,0,0,0.2);
    --ink: #2c2927;
    --accent: #a64d4d;
    --gold: #b39665;
  }
  * { box-sizing: border-box; }
  body {
    background-color: var(--bg-wood);
    background-image: url('https://www.transparenttextures.com/patterns/dark-wood.png');
    margin: 0;
    padding: 50px 20px;
    display: flex;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
  }
  .wrapper { max-width: 840px; width: 100%; }
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
  }
  .back-btn, .accion-btn {
    font-family: 'Special Elite';
    font-size: 0.8rem;
    color: #fff;
    text-decoration: none;
    opacity: 0.75;
    background: none;
    border: 1px solid rgba(255,255,255,0.4);
    padding: 6px 12px;
    cursor: pointer;
  }
  .tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 15px;
    flex-wrap: wrap;
  }
  .tab {
    font-family: 'Special Elite', sans-serif;
    font-size: 0.65rem;
    text-transform: uppercase;
    color: white;
    text-decoration: none;
    padding: 8px 14px;
    border-radius: 4px 4px 0 0;
    opacity: 0.6;
  }
  .tab.activa { opacity: 1; box-shadow: 0 -2px 6px rgba(0,0,0,0.2); }
  .tab-poemas { background: #a64d4d; }
  .tab-musica { background: #5d7a8c; }
  .tab-libros { background: #8c3b3b; }
  .tab-fotos { background: #4a3b31; }
  .tab-favoritos { background: #6d5b46; }

  .sheet {
    background: var(--paper);
    background-image: linear-gradient(var(--line-blue) 1px, transparent 1px);
    background-size: 100% 1.6em;
    width: 100%;
    min-height: 500px;
    padding: 60px 60px 60px 90px;
    box-shadow: 10px 10px 30px rgba(0,0,0,0.5);
    position: relative;
  }
  .sheet::before {
    content: '';
    position: absolute;
    left: 70px; top: 0; bottom: 0; width: 1px;
    background: var(--margin-red);
  }
  .dueno {
    font-family: 'La Belle Aurore', cursive;
    font-size: 2.8rem;
    color: var(--accent);
    margin: 0 0 40px;
  }
  .entry { margin-bottom: 60px; position: relative; }
  .date {
    font-family: 'Special Elite', sans-serif;
    font-size: 0.75rem;
    color: #888;
    display: block;
    margin-bottom: 5px;
  }
  .title {
    font-family: 'La Belle Aurore', cursive;
    font-size: 2.2rem;
    color: var(--accent);
    margin: 0 0 15px 0;
  }
  .cuerpo {
    font-size: 1.3rem;
    line-height: 1.6em;
    color: var(--ink);
    font-style: italic;
    white-space: pre-line;
  }
  .footnote {
    font-family: 'Special Elite', sans-serif;
    font-size: 0.65rem;
    margin-top: 12px;
    opacity: 0.6;
    text-align: right;
  }
  .foto-img {
    width: 100%;
    max-width: 300px;
    display: block;
    margin-bottom: 10px;
    filter: sepia(0.2);
  }
  .vacio {
    font-family: 'Special Elite', sans-serif;
    font-size: 0.85rem;
    color: #999;
    text-align: center;
    padding: 60px 0;
  }
</style>
</head>
<body>

<div class="wrapper">
  <div class="top-bar">
    <a href="directorio.html" class="back-btn">← Todos los muros</a>
    <a id="btn-agregar" href="#" class="accion-btn" style="display:none; text-decoration:none;">+ Agregar</a>
  </div>

  <div class="tabs" id="tabs"></div>

  <main class="sheet">
    <h1 class="dueno" id="nombre-dueno">Cargando...</h1>
    <div id="contenedor"></div>
  </main>
</div>

<script src="supabase-client.js"></script>
<script>
  // Configuración de cada sección: tabla, campos y cómo renderizarlos
  const SECCIONES = {
    poemas:    { label: "Poemas",     tabla: "poemas",    titulo: "titulo", cuerpo: "texto", fecha: "fecha", nota: "nota" },
    musica:    { label: "Música",     tabla: "canciones", titulo: "album",  cuerpo: "resena", fecha: "anio", nota: "artista" },
    libros:    { label: "Libros",     tabla: "libros",    titulo: "titulo", cuerpo: "analisis", fecha: null, nota: "autor" },
    fotos:     { label: "Fotos",      tabla: "fotos",     titulo: "leyenda", cuerpo: null, fecha: null, nota: null, esFoto: true },
    favoritos: { label: "Favoritos",  tabla: "favoritos", titulo: null, cuerpo: "cita", fecha: null, nota: "autor" }
  };

  const params = new URLSearchParams(window.location.search);
  const username = params.get('usuario');
  const seccion = params.get('seccion') || 'poemas';
  const config = SECCIONES[seccion] || SECCIONES.poemas;

  // Armamos las pestañas
  const tabsEl = document.getElementById('tabs');
  tabsEl.innerHTML = Object.keys(SECCIONES).map(key => `
    <a class="tab tab-${key} ${key === seccion ? 'activa' : ''}"
       href="muro.html?usuario=${encodeURIComponent(username || '')}&seccion=${key}">
      ${SECCIONES[key].label}
    </a>
  `).join('');

  (async () => {
    const contenedor = document.getElementById('contenedor');
    const nombreDueno = document.getElementById('nombre-dueno');

    if (!username) {
      nombreDueno.textContent = "Muro no encontrado";
      contenedor.innerHTML = '<p class="vacio">Entrá desde el directorio para ver un muro.</p>';
      return;
    }

    const { data: perfil, error: errorPerfil } = await supabaseClient
      .from('perfiles')
      .select('id, username, nombre_mostrado')
      .eq('username', username)
      .single();

    if (errorPerfil || !perfil) {
      nombreDueno.textContent = "Muro no encontrado";
      contenedor.innerHTML = '<p class="vacio">No existe un muro con ese nombre de usuario.</p>';
      return;
    }

    nombreDueno.textContent = perfil.nombre_mostrado || perfil.username;

    const sesion = await obtenerSesionActual();
    const btnAgregar = document.getElementById('btn-agregar');
    if (sesion && sesion.user.id === perfil.id) {
      btnAgregar.style.display = 'inline-block';
      btnAgregar.href = `agregar.html?seccion=${seccion}`;
    }

    const { data: items, error: errorItems } = await supabaseClient
      .from(config.tabla)
      .select('*')
      .eq('user_id', perfil.id)
      .order('creado_en', { ascending: false });

    if (errorItems || !items || items.length === 0) {
      contenedor.innerHTML = `<p class="vacio">Todavía no hay nada en "${config.label}".</p>`;
      return;
    }

    contenedor.innerHTML = items.map(item => {
      if (config.esFoto) {
        return `
          <article class="entry">
            <img class="foto-img" src="${item.url_imagen}" alt="${item.leyenda || ''}">
            <div class="footnote">${item.leyenda || ''}</div>
          </article>
        `;
      }
      return `
        <article class="entry">
          ${config.fecha ? `<span class="date">${item[config.fecha] || ''}</span>` : ''}
          ${config.titulo ? `<h2 class="title">${item[config.titulo]}</h2>` : ''}
          ${config.cuerpo ? `<div class="cuerpo">${item[config.cuerpo] || ''}</div>` : ''}
          ${config.nota ? `<div class="footnote">${item[config.nota] || ''}</div>` : ''}
        </article>
      `;
    }).join('');
  })();
</script>

</body>
</html>
